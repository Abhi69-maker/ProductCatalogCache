version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: demo_postgres

    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: demo_redis

    ports:
      - "6379:6379"